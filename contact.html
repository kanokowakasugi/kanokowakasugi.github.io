<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Kanoko Wakasugi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <span class="brand">kanoko wakasugi</span>
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="works.html">Works</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html" class="is-active">Contact</a>
  </nav>
</header>

<main class="wrap">

  <div class="page-title">
    <h1>Contact</h1>
  </div>

  <p>Feel free to reach out by email.</p>

  <p class="contact-email">
    <a href="mailto:[email protected]" id="email-link">[email protected]</a>
    <span class="copy-note" id="copy-note"></span>
  </p>

</main>

<footer class="site-footer">
  <span>&copy; 2026 kanoko wakasugi</span>
  <span><a href="index.html">Back home</a></span>
</footer>

<script>
  const link = document.getElementById('email-link');
  const note = document.getElementById('copy-note');
  link.addEventListener('click', function (e) {
    e.preventDefault();
    const email = link.textContent.trim();
    navigator.clipboard.writeText(email).then(function () {
      note.textContent = 'Copied';
      setTimeout(function () { note.textContent = ''; }, 1500);
    });
  });
</script>

</body>
</html>
