<script>
  const text = "in progress";
  const el = document.getElementById('typewriter');
  let i = 0;
  function type() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
      setTimeout(type, 110);
    }
  }
  type();
</script>
